<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Age calculator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="header-title">AGE CALCULATOR</h1>
        <img src="/assets/broad-age.svg" alt="age-icon" class="age-icon" />
    </header>
    <main class="main-ctn">
        <div class="output-ctn">
            <div class="output-holder">
                <p>AGE</p>
                <p id="age-value">loading...</p>
            </div>
        </div>
        
        <div class="input-ctn">
            <p id="error-msg"></p>
            <input type="date" id="input-field" placeholder="yyyy">
            <button id="calculate-btn">calculate</button>
        </div>
    </main>
    <script src="/js/main.js"></script>
</body>
</html>
